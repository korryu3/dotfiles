# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# general
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g automatic-rename on

# reload
bind r source-file ~/.tmux.conf \; display-message "reloaded"

# split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# clear-screen (prefix C-l, since root C-l is used for seamless navigation)
bind C-l send-keys C-l

# vi copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Escape send-keys -X cancel

# seamless pane navigation (vim-tmux-navigator compatible)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

# status bar (Nord)
set -g status-style "bg=#2e3440,fg=#d8dee9"
set -g status-left-length 30
set -g status-right-length 30
set -g status-left "#{?client_prefix,#[bg=#88c0d0]#[fg=#2e3440] PREFIX ,#[bg=#5e81ac]#[fg=#d8dee9]} #S #[default] "
set -g status-right "#[fg=#d8dee9] %m/%d %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#88c0d0,fg=#2e3440] #I:#W "
set -g window-status-separator ""

# pane border
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"

# message
set -g message-style "bg=#3b4252,fg=#d8dee9"
